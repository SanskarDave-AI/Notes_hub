<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register- IIIT Notes Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <h1>
                Create Your Account! <br>
                <span>Unlock a world of notes & PPTs.</span>
            </h1>
            <p> Register to create your profile, manage courses, and
            connect with fellow students to share resources.
            </p>
            <img src="bcd.png">
        </div>
        <div class="right">
            <div class="card">
                <h2>Join the Community!</h2>
                <p class="subtext">Set up your student profile to begin.</p>
                <input type="text" id="username" placeholder="Enter Username">
                <input type="email" id="email" placeholder="Enter Email">
                <div class="password-box">
                     <input type="password" id="password" placeholder="Create Password">
                     <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>
                <div class="password-box">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password">
                    <i class="fa-solid fa-eye" id="toggleConfirm"></i>
                </div>
                <button onclick="register()">Create Account</button>

                 <p id="errorMsg" class="error"></p>

                  <p class="switch">
                Already have an account? <a href="login.html">Login here</a>
                  </p>

            </div>
        </div>
    </div>
    <script src="register.js"></script>
</body>
</html>
